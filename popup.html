<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أعماق باقة سيفير</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <img src="icon.png" alt="شعار أعماق" class="logo">
        <h2>أعماق باقة سيفير</h2>
        <p class="description">أداة لتوفير استهلاك بيانات الإنترنت على يوتيوب وفيسبوك.</p>
        
        <div class="toggle-container">
            <label class="switch">
                <input type="checkbox" id="toggle-extension">
                <span class="slider round"></span>
            </label>
            <span id="status-text">جاري التحقق...</span>
        </div>

        <div class="footer">
            <p>مطورة بواسطة <br> <span class="brand-name">أعماق للتكنولوجيا المعلومات</span></p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
